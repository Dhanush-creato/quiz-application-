# =============================================
# Quiz Application ‚Äì application.properties
# =============================================
# Values are read from environment variables.
# Set them in .env (local) or Render dashboard (production).
# =============================================

# Server
server.port=${SERVER_PORT:8080}

# ‚îÄ‚îÄ‚îÄ Database (MySQL) ‚îÄ‚îÄ‚îÄ
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ‚îÄ‚îÄ‚îÄ JPA / Hibernate ‚îÄ‚îÄ‚îÄ
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ‚îÄ‚îÄ‚îÄ JWT ‚îÄ‚îÄ‚îÄ
app.jwtSecret=${JWT_SECRET}
app.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}

# ‚îÄ‚îÄ‚îÄ CORS ‚îÄ‚îÄ‚îÄ
app.cors.allowedOrigins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ‚îÄ‚îÄ‚îÄ Logging (less verbose in production) ‚îÄ‚îÄ‚îÄ
logging.level.org.springframework.security=WARN
logging.level.com.quizapp=INFO
