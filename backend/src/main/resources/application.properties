# =============================================
# Quiz Application – application.properties
# =============================================

# Server
server.port=8080

# ─── Database (MySQL) ───
spring.datasource.url=jdbc:mysql://localhost:3306/quiz_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
allowPublicKeyRetrieval=true

# ─── JPA / Hibernate ───
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ─── JWT ───
app.jwtSecret=QuizAppSuperSecretKey2024!@#$%^&*()_+ABCDEFGHIJKLMNOP
app.jwtExpirationMs=86400000

# ─── CORS ───
app.cors.allowedOrigins=http://localhost:3000

# ─── Logging ───
logging.level.org.springframework.security=DEBUG
logging.level.com.quizapp=DEBUG
