# =============================================
# Quiz Application ‚Äì application.properties
# =============================================

# Server
server.port=${PORT:8080}

# ‚îÄ‚îÄ‚îÄ Database (PostgreSQL / Neon) ‚îÄ‚îÄ‚îÄ
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ‚îÄ‚îÄ‚îÄ JPA / Hibernate ‚îÄ‚îÄ‚îÄ
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ‚îÄ‚îÄ‚îÄ JWT ‚îÄ‚îÄ‚îÄ
app.jwtSecret=${JWT_SECRET:QuizAppSuperSecretKey2024LocalDevOnly}
app.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}

# ‚îÄ‚îÄ‚îÄ CORS ‚îÄ‚îÄ‚îÄ
app.cors.allowedOrigins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ‚îÄ‚îÄ‚îÄ Logging ‚îÄ‚îÄ‚îÄ
logging.level.org.springframework.security=WARN
logging.level.com.quizapp=INFO