# =============================================
# Quiz Application – application.properties
# =============================================
# Uses Spring's ${VAR:default} syntax:
#   - Locally: falls back to the default value after the colon
#   - Production (Render): env vars override the defaults
# =============================================

# Server
server.port=${SERVER_PORT:8080}

# ─── Database (MySQL) ───
# Default points to local MySQL; Render sets DB_URL env var to override
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/quiz_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ───
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ─── JWT ───
# Default secret for local dev; ALWAYS override JWT_SECRET in production!
app.jwtSecret=${JWT_SECRET:QuizAppSuperSecretKey2024LocalDevOnly}
app.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}

# ─── CORS ───
app.cors.allowedOrigins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ─── Logging ───
logging.level.org.springframework.security=WARN
logging.level.com.quizapp=INFO
