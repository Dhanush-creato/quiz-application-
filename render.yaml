# =====================================================
# Render.com – Backend Deployment Configuration
# =====================================================
# This file auto-configures your Spring Boot backend
# when you connect your GitHub repo to Render.
# =====================================================

services:
  - type: web
    name: quiz-backend
    runtime: docker
    # ⚠️  Set rootDir to backend folder
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/categories
    envVars:
      - key: DB_URL
        sync: false          # Set manually in Render dashboard
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: JWT_EXPIRATION_MS
        value: "86400000"
      - key: CORS_ALLOWED_ORIGINS
        sync: false          # Set to your Vercel frontend URL after deploying
      - key: SERVER_PORT
        value: "8080"
